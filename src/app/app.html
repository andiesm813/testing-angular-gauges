<div class="layout" [class.theme-dark]="themeService.darkMode()">
  <nav class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">&#9632;</span>
      <span class="sidebar-title">Gauges</span>
    </div>
    <ul class="nav-list">
      <li>
        <a routerLink="/progress" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="13" width="3" height="5" rx="1" fill="currentColor"/>
            <rect x="7" y="9" width="3" height="9" rx="1" fill="currentColor"/>
            <rect x="12" y="5" width="3" height="13" rx="1" fill="currentColor"/>
            <rect x="17" y="2" width="3" height="16" rx="1" fill="currentColor"/>
          </svg>
          <span>Progress Gauge</span>
        </a>
      </li>
      <li>
        <a routerLink="/status" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2"/>
            <path d="M10 10 L14 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="10" r="1.5" fill="currentColor"/>
          </svg>
          <span>Status Gauge</span>
        </a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <button class="theme-toggle" (click)="themeService.toggle()" [attr.aria-pressed]="themeService.darkMode()">
        <svg class="theme-icon" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          @if (themeService.darkMode()) {
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          } @else {
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 1.78a1 1 0 011.415 1.415l-.707.707a1 1 0 01-1.415-1.415l.707-.707zM18 9a1 1 0 110 2h-1a1 1 0 110-2h1zM4.93 14.364l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM3 10a1 1 0 110-2h1a1 1 0 110 2H3zm11.364-5.657l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414-1.414zM5.636 14.364a1 1 0 010-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414 0zM10 6a4 4 0 100 8 4 4 0 000-8z"/>
          }
        </svg>
        <span class="theme-toggle-label">{{ themeService.darkMode() ? 'Dark' : 'Light' }}</span>
        <div class="toggle-track" aria-hidden="true">
          <div class="toggle-thumb"></div>
        </div>
      </button>
    </div>
  </nav>
  <main class="content">
    <router-outlet />
  </main>
</div>
