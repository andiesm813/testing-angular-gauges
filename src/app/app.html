<div class="gauges-page">
  <h2>Ignite UI Gauges</h2>

  <div class="gauges-flex">
  <section class="gauge-section linear-gauge-section">
    <p class="lg-title">Current Temperature</p>
    <p class="lg-value">{{ linearValue }}</p>
    <igx-linear-gauge
      width="100%"
      height="80px"
      [minimumValue]="0"
      [maximumValue]="100"
      [value]="linearValue"
      [interval]="10"
      [labelExtent]="0.02"
      font="14px sans-serif"
      [scaleStartExtent]="0.05"
      [scaleEndExtent]="0.95">
      <igx-linear-graph-range
        [startValue]="0"
        [endValue]="linearValue"

        [innerStartExtent]="0.15"
        [innerEndExtent]="0.15"
        [outerStartExtent]="0.85"
        [outerEndExtent]="0.85">
      </igx-linear-graph-range>
      <igx-linear-graph-range
        [startValue]="linearValue"
        [endValue]="100"

        [innerStartExtent]="0.15"
        [innerEndExtent]="0.15"
        [outerStartExtent]="0.85"
        [outerEndExtent]="0.85">
      </igx-linear-graph-range>
    </igx-linear-gauge>
  </section>

  <section class="gauge-section radial-gauge-section">
    <igx-radial-gauge
      width="320px"
      height="280px"
      [minimumValue]="0"
      [maximumValue]="100"
      [value]="radialValue"
      [scaleStartAngle]="170"
      [scaleEndAngle]="10"
      [labelInterval]="100"
      [labelExtent]="0.62"
      font="14px sans-serif"
      [minorTickCount]="0"
      [tickStrokeThickness]="0"
      [scaleStartExtent]="0.57"
      [scaleEndExtent]="0.88"
      needleShape="Triangle"
      needlePivotShape="None"
      [needleStartExtent]="0"
      [needleEndExtent]="0.65"
      [needleStartWidthRatio]="0"
      [needleEndWidthRatio]="0.06"
      [titleDisplaysValue]="true"
      titleTextStyle="bold 2.2rem sans-serif"
      [titleExtent]="0.58">
      <igx-radial-gauge-range
        [startValue]="0"
        [endValue]="radialValue"

        [innerStartExtent]="0.57"
        [innerEndExtent]="0.57"
        [outerStartExtent]="0.88"
        [outerEndExtent]="0.88">
      </igx-radial-gauge-range>
      <igx-radial-gauge-range
        [startValue]="radialValue"
        [endValue]="100"

        [innerStartExtent]="0.57"
        [innerEndExtent]="0.57"
        [outerStartExtent]="0.88"
        [outerEndExtent]="0.88">
      </igx-radial-gauge-range>
    </igx-radial-gauge>
  </section>

  <section class="gauge-section bullet-graph-section">
    <p class="bg-title">Current Temperature</p>
    <p class="bg-value">57</p>
    <igx-bullet-graph
      width="100%"
      height="100px"
      [minimumValue]="30"
      [maximumValue]="60"
      [value]="57"
      [targetValue]="53"
      targetValueName="Target 53"
      [interval]="10"
      [labelExtent]="0.05"
      [valueInnerExtent]="0.4"
      [valueOuterExtent]="0.65"


      [targetValueBreadth]="12"
      [targetValueInnerExtent]="0.3"
      [targetValueOuterExtent]="0.75"

      [scaleStartExtent]="0.05"
      [scaleEndExtent]="0.95"

      font="14px sans-serif">
      <igx-linear-graph-range
        [startValue]="30"
        [endValue]="40"

        [innerStartExtent]="0.3"
        [innerEndExtent]="0.3"
        [outerStartExtent]="0.8"
        [outerEndExtent]="0.8">
      </igx-linear-graph-range>
      <igx-linear-graph-range
        [startValue]="40"
        [endValue]="50"

        [innerStartExtent]="0.3"
        [innerEndExtent]="0.3"
        [outerStartExtent]="0.8"
        [outerEndExtent]="0.8">
      </igx-linear-graph-range>
      <igx-linear-graph-range
        [startValue]="50"
        [endValue]="60"

        [innerStartExtent]="0.3"
        [innerEndExtent]="0.3"
        [outerStartExtent]="0.8"
        [outerEndExtent]="0.8">
      </igx-linear-graph-range>
    </igx-bullet-graph>
  </section>
  </div>
</div>
